<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="https://raw.githubusercontent.com/danaa8284-eng/geolin/refs/heads/main/GOEM.jpg" type="image/x-icon">
<title>Goem Group AI Mode - Dashboard</title>
<link rel="stylesheet" href="./style.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:wght@700;800;900&display=swap" rel="stylesheet">
</head>

<body>

<!-- ===== LOADING SCREEN (TIDAK DIUBAH) ===== -->
<div id="loading-screen" class="loading-screen">
  <div class="loading-content">
    <div class="loading-logo-container">
      <div class="loading-ring"></div>
      <div class="loading-ring loading-ring-2"></div>
      <div class="loading-ring loading-ring-3"></div>
      <img src="https://raw.githubusercontent.com/danaa8284-eng/geolin/refs/heads/main/GOEM.jpg" alt="GOEM Logo" class="loading-logo">
    </div>
    <p class="loading-subtitle">AI Mode</p>
    <div class="loading-bar-container">
      <div class="loading-bar"></div>
    </div>
    <p class="loading-text">Memuat sistem...</p>
  </div>
  <div class="loading-particles" id="particles"></div>
</div>

<!-- ===== MAIN APP ===== -->
<div id="app" class="app hidden">
  <div class="layout">

    <!-- SIDEBAR -->
    <aside class="sidebar">
      <div class="sidebar-logo">GOEM</div>
      <div class="sidebar-menu">
        <a href="analis.html" class="menu-item">📊 Dashboard Chat</a>
        <a href="dasboard1.html" class="menu-item">⚙️ Setting AI Agent</a>
      </div>
    </aside>

    <!-- CONTENT -->
    <div class="content">

      <!-- HEADER -->
      <header class="header">
        <div class="header-left">
          <img src="https://raw.githubusercontent.com/danaa8284-eng/geolin/refs/heads/main/goem2.jpg" class="header-logo">
          <div class="header-title-group">
            <span class="header-badge">AI Mode</span>
          </div>
        </div>

        <div class="header-right">
          <div id="status" class="header-notif"></div>
          <div class="header-status" id="header-status">
            <span class="status-dot"></span>
            <span class="status-text">Online</span>
          </div>
        </div>
      </header>

      <!-- MAIN -->
      <main class="main-content">

        <!-- LOADING -->
        <div id="loading" class="loading-overlay">
          <div class="spinner"></div>
          <p>Memuat data...</p>
        </div>

        <!-- TITLE -->
        <div class="section-header">
          <h2 class="section-title">📊 Dashboard Chat</h2>
        </div>

        <!-- FILTER -->
        <div class="card filter-card">
          <div class="card-body filter-container">

            <div class="filter-group">
              <label>Tanggal Mulai</label>
              <input type="date" id="startDate" class="input-field" onclick="this.showPicker()">
            </div>

            <div class="filter-group">
              <label>Tanggal Berakhir</label>
              <input type="date" id="endDate" class="input-field" onclick="this.showPicker()">
            </div>

            <div class="filter-action">
              <button onclick="loadChartData()" class="btn-save">
                Filter
              </button>
            </div>

          </div>
        </div>

        <!-- CS SELECTOR -->
        <div class="card cs-card">
          <div class="cs-wrapper">

            <div id="csButtons" class="cs-container">
              <button class="cs-btn active" data-cs="cs1">CS Tas Kulit</button>
              <button class="cs-btn" data-cs="cs2">CS Tas Kanvas</button>
              <button class="cs-btn" data-cs="cs3">CS 3</button>
              <button class="cs-btn" data-cs="cs4">CS 4</button>
            </div>

            <div class="cs-action">
              <button onclick="applyCS()" class="btn-save">Apply</button>
            </div>

          </div>
        </div>

        <!-- TOTAL -->
        <div class="card total-card">
          <div class="card-header">
            <h3>Total Chat</h3>
          </div>

          <div class="card-body total-body">
            <div class="total-value" id="totalChat">0</div>
          </div>
        </div>

        <!-- CHART -->
        <div class="card chart-card">
          <canvas id="chart"></canvas>
        </div>

      </main>

      <!-- FOOTER -->
      <footer class="footer">
        <p>&copy; 2026 Goem Group AI Mode. All rights reserved.</p>
      </footer>

    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="./script2.js"></script>

</body>
</html>
