<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="https://raw.githubusercontent.com/danaa8284-eng/geolin/refs/heads/main/GOEM.jpg">
  <title>Goem Group AI Mode - Dashboard</title>

  <link rel="stylesheet" href="./style.css">

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>

<body>

<!-- ===== LOADING ===== -->
<div id="loading-screen" class="loading-screen">
  <div class="loading-content">
    <img src="https://raw.githubusercontent.com/danaa8284-eng/geolin/refs/heads/main/GOEM.jpg" class="loading-logo">
    <p>Memuat sistem...</p>
  </div>
</div>

<!-- ===== APP ===== -->
<div id="app" class="app hidden">

  <div class="layout">

    <!-- SIDEBAR -->
    <aside class="sidebar">
      <div class="sidebar-logo">GOEM</div>

      <div class="sidebar-menu">
        <a href="analis.html" class="menu-item">📊 Dashboard Chat</a>
        <a href="dasboard1.html" class="menu-item">⚙️ Setting AI</a>
      </div>
    </aside>

    <!-- CONTENT -->
    <div class="content">

      <!-- HEADER -->
      <header class="header">
        <div class="header-left">
          <img src="https://raw.githubusercontent.com/danaa8284-eng/geolin/refs/heads/main/goem2.jpg" class="header-logo">
          <span class="header-badge">AI Mode</span>
        </div>

        <div class="header-right">
          <div id="status" class="header-notif"></div>

          <div class="header-status">
            <span class="status-dot"></span>
            <span>Online</span>
          </div>
        </div>
      </header>

      <!-- MAIN -->
      <main class="main-content">

        <!-- LOADING -->
        <div id="loading" class="loading-overlay">
          <div class="spinner"></div>
          <p>Memuat data...</p>
        </div>

        <h2 class="section-title">📊 Dashboard Chat</h2>

        <!-- FILTER -->
        <div class="card">
          <div style="display:flex; gap:20px; flex-wrap:wrap; align-items:end;">
            
            <div>
              <label>Tanggal Mulai</label>
              <input type="date" id="startDate" class="input-field">
            </div>

            <div>
              <label>Tanggal Akhir</label>
              <input type="date" id="endDate" class="input-field">
            </div>

            <button onclick="loadChartDataMulti()" class="btn-save">
              Filter
            </button>

          </div>
        </div>

        <!-- CS BUTTON -->
        <div class="card">
          <div id="csButtons" style="display:flex; gap:10px; flex-wrap:wrap;">
            <button class="cs-btn active" data-cs="cs1">CS Kulit</button>
            <button class="cs-btn" data-cs="cs2">CS Kanvas</button>
            <button class="cs-btn" data-cs="cs3">CS 3</button>
            <button class="cs-btn" data-cs="cs4">CS 4</button>
          </div>
        </div>

        <!-- DASHBOARD FLEX -->
        <div style="display:flex; gap:20px; flex-wrap:wrap;">

          <!-- LEFT -->
          <div style="flex:3; min-width:300px; display:flex; flex-direction:column; gap:20px;">

            <!-- TOTAL SEMUA -->
            <div class="card">
              <h3>Total Semua Chat</h3>
              <div id="totalChat" style="font-size:36px; font-weight:bold;">0</div>
            </div>

            <!-- CHART -->
            <div class="card" style="height:400px;">
              <canvas id="chart"></canvas>
            </div>

          </div>

          <!-- RIGHT -->
          <div style="flex:1; min-width:220px;">
            <div class="card">
              <h3>Total per CS</h3>
              <div id="csSummary"></div>
            </div>
          </div>

        </div>

      </main>

      <!-- FOOTER -->
      <footer class="footer">
        <p>&copy; 2026 Goem Group</p>
      </footer>

    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="./script2.js"></script>

</body>
</html>
