<!DOCTYPE html>

<html lang="id">
<head>
<meta charset="UTF-8">
<title>Goem Grup - Login</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  height: 100vh;
  background: #0a0a0a;
  overflow: hidden;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* Background glow animasi */
body::before {
  content: "";
  position: absolute;
  width: 600px;
  height: 600px;
  background: radial-gradient(circle, #00aaff, transparent 60%);
  filter: blur(120px);
  animation: moveGlow 6s infinite alternate;
}

@keyframes moveGlow {
  from {
    transform: translate(-100px, -100px);
  }
  to {
    transform: translate(200px, 150px);
  }
}

/* Card login */
.card {
  position: relative;
  background: rgba(255, 255, 255, 0.05);
  backdrop-filter: blur(10px);
  padding: 40px;
  width: 320px;
  border-radius: 12px;
  box-shadow: 0 0 30px rgba(0, 170, 255, 0.3);
  text-align: center;
  z-index: 1;
}

/* Header */
h1 {
  color: #cccccc;
  margin-bottom: 20px;
  letter-spacing: 1px;
}

/* Input */
input {
  width: 100%;
  padding: 12px;
  margin-top: 12px;
  border: none;
  border-radius: 6px;
  outline: none;
  background: rgba(255,255,255,0.08);
  color: white;
}

/* Button */
button {
  width: 100%;
  padding: 12px;
  margin-top: 18px;
  border: none;
  border-radius: 6px;
  background: linear-gradient(90deg, #007bff, #00c6ff);
  color: white;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.05);
  box-shadow: 0 0 15px #00aaff;
}

/* Animasi muncul */
.card {
  animation: fadeIn 1s ease;
}

@keyframes fadeIn {
  from {
    opacity: 0;
    transform: translateY(30px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* Loading spinner */
.loader {
  display: none;
  margin-top: 15px;
  border: 3px solid rgba(255,255,255,0.1);
  border-top: 3px solid #00c6ff;
  border-radius: 50%;
  width: 22px;
  height: 22px;
  animation: spin 1s linear infinite;
  margin-left: auto;
  margin-right: auto;
}

@keyframes spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}

/* Notifikasi halus */
.msg {
  margin-top: 12px;
  font-size: 13px;
  color: #ff4d4d;
  opacity: 0;
  transition: 0.3s;
}

.msg.show {
  opacity: 1;
}

.msg.success {
  color: #00ffcc;
}

</style>

</head>

<body>

<div class="card">
  <h1>Goem Group</h1>

  <input type="text" id="user" placeholder="Username">
  <input type="password" id="pass" placeholder="Password">

  <button onclick="login()" id="btn">Login</button>

  <div class="loader" id="loader"></div>
  <div class="msg" id="msg"></div>

</div>

<script>
async function login() {
  const user = document.getElementById("user").value;
  const pass = document.getElementById("pass").value;
  const loader = document.getElementById("loader");
  const msg = document.getElementById("msg");
  const btn = document.getElementById("btn");

  // reset
  msg.className = "msg";
  msg.innerText = "";
  loader.style.display = "block";
  btn.disabled = true;

  try {
    const res = await fetch("https://n8n-wyv7h4exvgre.jkt1.sumopod.my.id/webhook/login", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ user, pass })
    });

    const data = await res.json();

    loader.style.display = "none";
    btn.disabled = false;

    if (data.status === "success") {
      localStorage.setItem("user", user);
      msg.innerText = "Login berhasil";
      msg.classList.add("show", "success");

      setTimeout(() => {
        window.location.href = "analis.html";
      }, 800);

    } else {
      msg.innerText = "Login gagal";
      msg.classList.add("show");
    }

  } catch (err) {
    loader.style.display = "none";
    btn.disabled = false;
    msg.innerText = "Server error login gagal";
    msg.classList.add("show");
  }
}
</script>

</body>
</html>
