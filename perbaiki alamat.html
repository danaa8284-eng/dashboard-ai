<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Formatter Alamat</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0b1e3a;
    color: #fff;
}

.container {
    max-width: 500px;
    margin: auto;
    padding: 15px;
}

.logo {
    text-align: center;
    margin-bottom: 15px;
}

.logo img {
    width: 80px;
    border-radius: 10px;
}

h2 {
    text-align: center;
    margin-bottom: 15px;
}

textarea {
    width: 100%;
    height: 150px;
    border-radius: 10px;
    border: none;
    padding: 10px;
    background: #132b50;
    color: #fff;
    margin-bottom: 10px;
}

button {
    width: 100%;
    padding: 10px;
    margin-bottom: 10px;
    border-radius: 10px;
    border: none;
    font-size: 14px;
    background: #1e88ff;
    color: white;
    font-weight: bold;
    cursor: pointer;
}

button:hover {
    background: #1565c0;
}

.output {
    background: #132b50;
    padding: 10px;
    border-radius: 10px;
    white-space: pre-line;
    min-height: 100px;
    margin-bottom: 10px;
}

.copy-btn {
    background: #00c853;
}

.toggle-box {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: #132b50;
    padding: 8px 10px;
    border-radius: 10px;
    margin-bottom: 10px;
    font-size: 13px;
}

.test-label {
    color: #ff5252;
    font-weight: bold;
}

/* ONGKIR */
#ongkirBox {
    border-left: 4px solid #00c853;
}

/* badge */
.beta-badge {
    position: fixed;
    top: 10px;
    left: 10px;
    background: linear-gradient(135deg, #42a5f5, #1e88ff);
    color: white;
    font-size: 11px;
    font-weight: bold;
    padding: 5px 10px;
    border-radius: 20px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.3);
    z-index: 999;
}
</style>
</head>

<body>
<div class="beta-badge">Beta</div>

<div class="container">

    <div class="logo">
        <img src="https://raw.githubusercontent.com/danaa8284-eng/geolin/refs/heads/main/GOEM.jpg">
    </div>

    <h2>Formatter Alamat</h2>

    <!-- INPUT -->
    <textarea id="inputAlamat" placeholder="Tempel alamat mentah di sini..."></textarea>

    <!-- MODE -->
    <div class="toggle-box">
        <span>Mode</span>
        <label>
            <input type="checkbox" id="modeTest">
            <span class="test-label">TEST</span>
        </label>
    </div>

    <button onclick="kirimData()">Proses</button>

    <!-- ONGKIR -->
    <div class="output" id="ongkirBox">
        📦 Ongkir akan muncul di sini...
    </div>

    <!-- OUTPUT -->
    <div class="output" id="hasilOutput"></div>

    <button class="copy-btn" onclick="copyText()">Copy Hasil</button>

</div>

<script>
async function kirimData() {
    const alamat = document.getElementById("inputAlamat").value.trim();
    const output = document.getElementById("hasilOutput");
    const ongkirBox = document.getElementById("ongkirBox");
    const isTest = document.getElementById("modeTest").checked;

    if (!alamat) {
        output.innerText = "Alamat belum diisi!";
        return;
    }

    const webhookURL = isTest
        ? "https://n8n-wyv7h4exvgre.jkt1.sumopod.my.id/webhook-test/perbaiki"
        : "https://n8n-wyv7h4exvgre.jkt1.sumopod.my.id/webhook/perbaiki";

    output.innerText = "Memproses...";
    ongkirBox.innerText = "Mengambil ongkir...";

    try {
        const res = await fetch(webhookURL, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ alamat })
        });

        let data = await res.json();

        // reset
        output.innerText = "";
        ongkirBox.innerText = "";

        // ===== ONGKIR =====
        const ongkir = Array.isArray(data)
            ? data.filter(item => item.courier)
            : [];

        if (ongkir.length > 0) {
            let text = "📦 Ongkir:\n\n";

            ongkir.forEach(item => {
                const price = Number(item.price) || 0;

                text += `${item.courier} - ${item.service}
💰 Rp ${price.toLocaleString()}
⏱ ${item.etd}

`;
            });

            ongkirBox.innerText = text.trim();

        } else {
            ongkirBox.innerText = "❌ Ongkir tidak tersedia";
        }

        // ===== OUTPUT =====
        if (Array.isArray(data)) {
            output.innerText = data[0]?.output || "Tidak ada data";
        } else {
            output.innerText = data.output || JSON.stringify(data);
        }

    } catch (err) {
        output.innerText = "Error, cek alamat kamu";
        ongkirBox.innerText = "Gagal ambil ongkir";
        console.error(err);
    }
}

function copyText() {
    const text = document.getElementById("hasilOutput").innerText;

    if (!text) {
        alert("Belum ada hasil!");
        return;
    }

    navigator.clipboard.writeText(text);
    alert("Berhasil disalin!");
}
</script>

</body>
</html>
