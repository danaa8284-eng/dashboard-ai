<!DOCTYPE html>

<html lang="id">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>
</head>

<body>

<h2>Dashboard Setting</h2>

<p>Prompt untuk AI:</p>
<textarea id="prompt"></textarea>

<br><br>

<p>Gambar 1:</p>
<input type="text" id="img1">
<p>Caption 1:</p>
<input type="text" id="cap1">

<br><br>

<p>Gambar 2:</p>
<input type="text" id="img2">
<p>Caption 2:</p>
<input type="text" id="cap2">

<br><br>

<p>Gambar 3:</p>
<input type="text" id="img3">
<p>Caption 3:</p>
<input type="text" id="cap3">

<br><br>

<p>Gambar 4:</p>
<input type="text" id="img4">
<p>Caption 4:</p>
<input type="text" id="cap4">

<br><br>

<p>Gambar 5:</p>
<input type="text" id="img5">
<p>Caption 5:</p>
<input type="text" id="cap5">

<br><br>

<p>Caption Bebas:</p>
<input type="text" id="freecap">

<br><br>

<button onclick="save()">SIMPAN</button>

<script>

// 🔹 LOAD DATA SAAT HALAMAN DIBUKA
async function loadData() {
  const user = localStorage.getItem("user");

  if (!user) {
    alert("Belum login");
    window.location.href = "index.html";
    return;
  }

  try {
    const res = await fetch("https://n8n-wyv7h4exvgre.jkt1.sumopod.my.id/webhook/update", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ user })
    });

    const data = await res.json();

    // isi form
    document.getElementById("prompt").value = data.prompt || "";
    document.getElementById("img1").value = data.img1 || "";
    document.getElementById("cap1").value = data.cap1 || "";
    document.getElementById("img2").value = data.img2 || "";
    document.getElementById("cap2").value = data.cap2 || "";
    document.getElementById("img3").value = data.img3 || "";
    document.getElementById("cap3").value = data.cap3 || "";
    document.getElementById("img4").value = data.img4 || "";
    document.getElementById("cap4").value = data.cap4 || "";
    document.getElementById("img5").value = data.img5 || "";
    document.getElementById("cap5").value = data.cap5 || "";
    document.getElementById("freecap").value = data.freecap || "";

  } catch (err) {
    console.error(err);
    alert("Gagal load data");
  }
}


// 🔹 SIMPAN DATA
async function save() {
  const user = localStorage.getItem("user");

  if (!user) {
    alert("User tidak ditemukan, silakan login ulang");
    return;
  }

  const data = {
    user: user,
    prompt: document.getElementById("prompt").value,
    img1: document.getElementById("img1").value,
    cap1: document.getElementById("cap1").value,
    img2: document.getElementById("img2").value,
    cap2: document.getElementById("cap2").value,
    img3: document.getElementById("img3").value,
    cap3: document.getElementById("cap3").value,
    img4: document.getElementById("img4").value,
    cap4: document.getElementById("cap4").value,
    img5: document.getElementById("img5").value,
    cap5: document.getElementById("cap5").value,
    freecap: document.getElementById("freecap").value
  };

  try {
    const res = await fetch("https://n8n-wyv7h4exvgre.jkt1.sumopod.my.id/webhook/data-input", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(data)
    });

    await res.json();

    alert("Data berhasil disimpan");

  } catch (error) {
    alert("Gagal mengirim data");
    console.error(error);
  }
}


// auto load saat buka halaman
window.onload = loadData;

</script>

</body>
</html>
