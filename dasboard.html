<!DOCTYPE html>

<html lang="id">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>
</head>

<body>

<h2>Dashboard Setting</h2>

<p id="status">Memuat data...</p>

<p>Prompt untuk AI:</p>
<textarea id="prompt"></textarea>

<br><br>

<p>Gambar 1:</p>
<input type="text" id="img1">
<p>Caption 1:</p>
<input type="text" id="cap1">

<br><br>

<p>Gambar 2:</p>
<input type="text" id="img2">
<p>Caption 2:</p>
<input type="text" id="cap2">

<br><br>

<p>Gambar 3:</p>
<input type="text" id="img3">
<p>Caption 3:</p>
<input type="text" id="cap3">

<br><br>

<p>Gambar 4:</p>
<input type="text" id="img4">
<p>Caption 4:</p>
<input type="text" id="cap4">

<br><br>

<p>Gambar 5:</p>
<input type="text" id="img5">
<p>Caption 5:</p>
<input type="text" id="cap5">

<br><br>

<p>Caption Bebas:</p>
<input type="text" id="freecap">

<br><br>

<button onclick="save()">SIMPAN</button>

<script>

// 🔹 LOAD DATA (pakai 1 webhook)
async function loadData() {
  const status = document.getElementById("status");
  const user = localStorage.getItem("user");

  if (!user) {
    alert("Belum login");
    window.location.href = "index.html";
    return;
  }

  status.innerText = "⏳ Memuat data...";

  try {
    const res = await fetch("https://n8n-wyv7h4exvgre.jkt1.sumopod.my.id/webhook/data-input", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        action: "get",
        user: user
      })
    });

    const text = await res.text();
    console.log("RAW RESPONSE:", text);

    const resData = text ? JSON.parse(text) : {};
    const data = Array.isArray(resData) ? resData[0] : resData;

    if (!data || Object.keys(data).length === 0) {
      status.innerText = "⚠️ Data tidak ditemukan";
      return;
    }

    document.getElementById("prompt").value = data["promp"] || "";
    document.getElementById("img1").value = data["gambar 1"] || "";
    document.getElementById("cap1").value = data["caption 1"] || "";
    document.getElementById("img2").value = data["gambar 2"] || "";
    document.getElementById("cap2").value = data["caption 2"] || "";
    document.getElementById("img3").value = data["gambar 3"] || "";
    document.getElementById("cap3").value = data["caption 3"] || "";
    document.getElementById("img4").value = data["gambar 4"] || "";
    document.getElementById("cap4").value = data["caption 4"] || "";
    document.getElementById("img5").value = data["gambar 5"] || "";
    document.getElementById("cap5").value = data["caption 5"] || "";
    document.getElementById("freecap").value = data["Teks pesan "] || "";

    status.innerText = "✅ Data berhasil dimuat";

    setTimeout(() => {
      status.innerText = "";
    }, 3000);

  } catch (err) {
    console.error(err);
    status.innerText = "❌ Gagal memuat data";
  }
}


// 🔹 SIMPAN DATA (pakai webhook yang sama)
async function save() {
  const status = document.getElementById("status");
  const user = localStorage.getItem("user");

  if (!user) {
    alert("User tidak ditemukan");
    return;
  }

  const data = {
    action: "save",
    user: user,
    prompt: document.getElementById("prompt").value,
    img1: document.getElementById("img1").value,
    cap1: document.getElementById("cap1").value,
    img2: document.getElementById("img2").value,
    cap2: document.getElementById("cap2").value,
    img3: document.getElementById("img3").value,
    cap3: document.getElementById("cap3").value,
    img4: document.getElementById("img4").value,
    cap4: document.getElementById("cap4").value,
    img5: document.getElementById("img5").value,
    cap5: document.getElementById("cap5").value,
    freecap: document.getElementById("freecap").value
  };

  status.innerText = "⏳ Menyimpan data...";

  try {
    const res = await fetch("https://n8n-wyv7h4exvgre.jkt1.sumopod.my.id/webhook/data-input", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(data)
    });

    const text = await res.text();
    console.log("SAVE RESPONSE:", text);

    status.innerText = "✅ Data berhasil disimpan";

    setTimeout(() => {
      status.innerText = "";
    }, 3000);

  } catch (error) {
    console.error(error);
    status.innerText = "❌ Gagal menyimpan data";
  }
}


// 🔹 AUTO LOAD
document.addEventListener("DOMContentLoaded", loadData);

</script>

</body>
</html>
